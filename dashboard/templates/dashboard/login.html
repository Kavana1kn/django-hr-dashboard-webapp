<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>HR Demo Login</title>
    <style>
        body { background: #1e293b; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0;}
        .card { background: white; padding: 2rem; border-radius: 8px; width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        input, button { width: 100%; padding: 0.75rem; margin-top: 0.5rem; margin-bottom: 1rem; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">🔒 HR System Demo</h2>
        <form method="POST">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" placeholder="Type anything..." required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Type anything..." required>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
